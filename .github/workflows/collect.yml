name: Collect outage schedules

on:
  # Triggered by an external scheduler (the server's systemd timer) via the
  # workflow_dispatch REST API — see README. GitHub's own cron is intentionally
  # not used (best-effort/throttled). Add a `schedule:` here if you ever want a
  # fallback. workflow_dispatch must exist on the default branch to be callable.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Persist cleared-challenge cookies between runs to reduce WAF challenges.
      - name: Restore browser state
        uses: actions/cache@v4
        with:
          path: .cache
          key: browser-state-${{ github.run_id }}
          restore-keys: |
            browser-state-

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare data branch
        run: |
          if git ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
            git fetch origin data
            git worktree add -B data data-branch origin/data
          else
            git worktree add --detach data-branch
            cd data-branch
            git checkout --orphan data
            git rm -rf . >/dev/null 2>&1 || true
          fi

      - name: Collect schedules
        env:
          LOG_LEVEL: info
          # Run a real, on-screen browser (via xvfb-run below) so Imperva
          # Incapsula clears its JS challenge instead of blocking headless.
          HEADFUL: '1'
          STORAGE_STATE_PATH: ${{ github.workspace }}/.cache/state.json
          # Optional Telegram notifications (set as repo secrets; never logged).
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
        run: xvfb-run -a node src/index.js --out data-branch

      - name: Publish if changed
        run: |
          cd data-branch
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "data: update outage schedules ($(date -u +%FT%TZ))"
            git push origin HEAD:data
          fi
