name: Collect outage schedules

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      # Persist cleared-challenge cookies between runs to reduce WAF challenges.
      - name: Restore browser state
        uses: actions/cache@v4
        with:
          path: .cache
          key: browser-state-${{ github.run_id }}
          restore-keys: |
            browser-state-

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare data branch
        run: |
          if git ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
            git fetch origin data
            git worktree add -B data data-branch origin/data
          else
            git worktree add --detach data-branch
            cd data-branch
            git checkout --orphan data
            git rm -rf . >/dev/null 2>&1 || true
          fi

      - name: Collect schedules
        env:
          LOG_LEVEL: info
          STORAGE_STATE_PATH: ${{ github.workspace }}/.cache/state.json
        run: node src/index.js --out data-branch

      - name: Publish if changed
        run: |
          cd data-branch
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "data: update outage schedules ($(date -u +%FT%TZ))"
            git push origin HEAD:data
          fi
