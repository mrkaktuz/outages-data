name: Collect outage schedules

on:
  # GitHub registers cron schedules from the workflow on the DEFAULT branch and
  # only (re)reads them when this file changes there. Best-effort every ~5 min.
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/collect.yml'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      # Persist cleared-challenge cookies between runs to reduce WAF challenges.
      - name: Restore browser state
        uses: actions/cache@v4
        with:
          path: .cache
          key: browser-state-${{ github.run_id }}
          restore-keys: |
            browser-state-

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare data branch
        run: |
          if git ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
            git fetch origin data
            git worktree add -B data data-branch origin/data
          else
            git worktree add --detach data-branch
            cd data-branch
            git checkout --orphan data
            git rm -rf . >/dev/null 2>&1 || true
          fi

      - name: Collect schedules
        env:
          LOG_LEVEL: info
          STORAGE_STATE_PATH: ${{ github.workspace }}/.cache/state.json
          # Optional Telegram notifications (set as repo secrets; never logged).
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node src/index.js --out data-branch

      - name: Publish if changed
        run: |
          cd data-branch
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "data: update outage schedules ($(date -u +%FT%TZ))"
            git push origin HEAD:data
          fi

      # GitHub's */5 cron is throttled/unreliable for low-traffic repos. With a
      # DISPATCH_TOKEN secret (fine-grained PAT, Actions: read+write) each run
      # re-dispatches the next one, giving a steady ~5-min cadence. A guard skips
      # dispatch if another run is already active, so chains never pile up; the
      # cron remains a fallback to restart the chain if it ever dies. Without the
      # secret this is a no-op and the workflow relies on cron alone.
      - name: Keep the 5-minute chain alive
        if: ${{ always() }}
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "No DISPATCH_TOKEN; relying on the (best-effort) cron schedule."
            exit 0
          fi
          api="https://api.github.com/repos/$REPO/actions/workflows/collect.yml"
          active=$(curl -fsS -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" "$api/runs?per_page=50" \
            | jq '[.workflow_runs[] | select(.status=="queued" or .status=="in_progress")] | length')
          if [ "${active:-0}" -gt 1 ]; then
            echo "Another run is active ($active); not extending the chain."
            exit 0
          fi
          sleep 90
          curl -fsS -X POST -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api/dispatches" -d '{"ref":"main"}'
          echo "Dispatched the next run."
