<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Графіки відключень електроенергії</title>
<meta name="description" content="Графіки погодинних відключень електроенергії по всіх групах — дані оновлюються кожні ~5 хвилин.">
<script>
  // до першого рендера, щоб тема з куки не блимала
  (() => {
    const m = document.cookie.match(/(?:^|;\s*)theme=(dark|light)/);
    if (m) document.documentElement.dataset.theme = m[1];
  })();
</script>
<style>
  :root {
    --bg: #eef1f6; --panel: #ffffff; --ink: #1a2233; --ink-2: #5b6474;
    --line: #c6cedd; --head: #f2f4f9;
    --off: #333d4f; --off-soft: #dbe0e9;
    --pos: #b45309; --pos-bg: #fdf3e3;
    --bolt: #e5a400;
    --accent: #2457c5;
  }
  :root[data-theme="dark"] {
    --bg: #0f141c; --panel: #171e29; --ink: #e7ecf4; --ink-2: #97a1b3;
    --line: #38455c; --head: #1c2532;
    --off: #cdd6e4; --off-soft: #303c50;
    --pos: #e8a33d; --pos-bg: #2e2412;
    --bolt: #f2c14e;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #0f141c; --panel: #171e29; --ink: #e7ecf4; --ink-2: #97a1b3;
      --line: #38455c; --head: #1c2532;
      --off: #cdd6e4; --off-soft: #303c50;
      --pos: #e8a33d; --pos-bg: #2e2412;
      --bolt: #f2c14e;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font: 15px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    padding: 20px clamp(10px, 3vw, 32px) 48px;
  }
  .topbar { display: flex; align-items: flex-start; gap: 12px; }
  .topbar h1 { flex: 1; }
  h1 { font-size: clamp(19px, 3.2vw, 26px); margin: 0 0 6px; }
  .meta { color: var(--ink-2); font-size: 13px; margin: 0 0 14px; }
  #themeBtn {
    flex: none; font: inherit; line-height: 1; cursor: pointer;
    background: var(--panel); color: var(--ink); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 10px;
  }
  #themeBtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .controls { display: flex; flex-wrap: wrap; gap: 10px 18px; align-items: end; margin: 0 0 14px; }
  .controls label { display: block; font-size: 12px; color: var(--ink-2); margin: 0 0 3px; }
  .controls select {
    font: inherit; color: var(--ink); background: var(--panel);
    border: 1px solid var(--line); border-radius: 8px; padding: 7px 10px; min-width: 150px;
  }
  .controls select:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .controls .check { display: flex; align-items: center; gap: 7px; padding: 8px 0; font-size: 14px; color: var(--ink); margin: 0; }
  .controls .check input { accent-color: var(--accent); width: 16px; height: 16px; margin: 0; }
  .banner {
    display: none; margin: 0 0 14px; padding: 10px 14px; border-radius: 8px; font-size: 14px;
    background: var(--pos-bg); border: 1px solid var(--pos); color: var(--ink);
  }
  .banner.show { display: block; }
  .tablewrap {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    overflow-x: auto; max-width: 100%;
  }
  table { border-collapse: collapse; width: 100%; min-width: 900px; }
  th, td { border: 1px solid var(--line); }
  thead th {
    position: sticky; top: 0; z-index: 2; background: var(--head);
    font-size: 12px; font-weight: 600; color: var(--ink-2); padding: 8px 2px;
  }
  thead th.corner { left: 0; z-index: 3; min-width: 108px; }
  thead th span { writing-mode: vertical-rl; transform: rotate(180deg); letter-spacing: .4px; }
  tbody th {
    position: sticky; left: 0; z-index: 1; background: var(--head);
    font-size: 13px; font-weight: 600; text-align: left; padding: 6px 12px; white-space: nowrap;
  }
  tbody tr { cursor: pointer; }
  tbody tr:hover td { background: color-mix(in srgb, var(--accent) 5%, transparent); }
  tbody tr.sel td { background: color-mix(in srgb, var(--accent) 14%, transparent); }
  tbody tr.sel th { background: color-mix(in srgb, var(--accent) 18%, var(--head)); }
  td.slot { padding: 0; height: 38px; min-width: 34px; position: relative; }
  td.slot .halves { position: absolute; inset: 0; display: flex; z-index: 0; }
  td.slot .h { flex: 1; }
  .h.off { background: var(--off-soft); }
  .h.pos {
    background: repeating-linear-gradient(45deg, var(--pos-bg) 0 4px, color-mix(in srgb, var(--pos) 45%, var(--pos-bg)) 4px 6px);
  }
  /* Іконка стану — inline-SVG по центру комірки, один розмір для всіх
     випадків (як у ДТЕК): перекреслена блискавка, а для пів-години поруч
     маленька жовта блискавка з боку, де світло є. */
  .ic {
    position: absolute; inset: 0; z-index: 1; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
  }
  .ic svg { width: 18px; height: 18px; display: block; }
  .below { display: flex; flex-wrap: wrap; gap: 10px 26px; align-items: baseline; padding: 14px 4px 0; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px 22px; font-size: 13px; color: var(--ink-2); }
  .legend .item { display: flex; align-items: center; gap: 8px; }
  .legend .sw {
    width: 30px; height: 22px; border: 1px solid var(--line); border-radius: 4px;
    position: relative; overflow: hidden; display: inline-flex; background: var(--panel);
  }
  .legend .sw > i { display: block; flex: 1; }
  .legend .sw .ic { flex: none; }
  .legend .sw .ic svg { width: 15px; height: 15px; }
  .empty { padding: 26px 18px; color: var(--ink-2); font-size: 15px; }
  .foot { flex: 1 1 240px; margin: 0 0 0 auto; font-size: 12.5px; color: var(--ink-2); text-align: right; }
  .foot a { color: var(--accent); }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <clipPath id="icL"><rect x="0" y="0" width="12" height="24"/></clipPath>
  <clipPath id="icR"><rect x="12" y="0" width="12" height="24"/></clipPath>
</defs></svg>
<div class="topbar">
  <h1 id="title">Графіки відключень електроенергії</h1>
  <button id="themeBtn" type="button" aria-label="Перемкнути тему">🌙</button>
</div>
<p class="meta" id="meta">Завантаження…</p>

<div class="controls">
  <div>
    <label for="region">Регіон</label>
    <select id="region"></select>
  </div>
  <div>
    <label for="date">Дата</label>
    <select id="date"></select>
  </div>
  <label class="check"><input type="checkbox" id="hideEmpty"> Приховати черги без відключень</label>
</div>

<div class="banner" id="banner"></div>
<div class="tablewrap" id="tablewrap"></div>

<div class="below">
  <div class="legend" id="legend">
    <span class="item"><span class="sw"><i></i></span> Світло є</span>
    <span class="item"><span class="sw" data-ic="w"><i class="h off"></i><i class="h off"></i></span> Світла нема</span>
    <span class="item"><span class="sw" data-ic="l"><i class="h off"></i><i></i></span> Нема перші 30 хв.</span>
    <span class="item"><span class="sw" data-ic="r"><i></i><i class="h off"></i></span> Нема другі 30 хв.</span>
    <span class="item"><span class="sw"><i class="h pos"></i><i class="h pos"></i></span> Можливе відключення</span>
  </div>
  <p class="foot">
    Дані: гілка <a href="https://github.com/mrkaktuz/outages-data/tree/data" rel="noopener">data</a>
    репозиторію <a href="https://github.com/mrkaktuz/outages-data" rel="noopener">outages-data</a>,
    сторінка оновлюється автоматично.
  </p>
</div>

<script>
(() => {
  'use strict';
  // Local dev (python -m http.server) → relative ./data/ copy; будь-який
  // продакшн-хост (github.io чи власний домен) → гілка data через raw.
  const DATA_BASE = ['localhost', '127.0.0.1', ''].includes(location.hostname)
    ? './data/'
    : 'https://raw.githubusercontent.com/mrkaktuz/outages-data/data/';

  const $ = (id) => document.getElementById(id);
  const els = { region: $('region'), date: $('date'), meta: $('meta'), banner: $('banner'),
                wrap: $('tablewrap'), title: $('title'), hideEmpty: $('hideEmpty'),
                themeBtn: $('themeBtn') };
  const DOW = ['нд', 'пн', 'вт', 'ср', 'чт', 'пт', 'сб'];
  const state = { index: null, doc: null, region: null, date: null };

  // --- іконки (стиль ДТЕК): одна блискавка на всі випадки; для пів-години
  // вона розрізана навпіл — половина без світла темна й перекреслена,
  // половина зі світлом жовта і не перекреслена ------------------------------
  // симетрична відносно x=12, щоб розріз навпіл давав рівні половини
  const BOLT = 'M14.5 1 5 13.5h5.3L9.5 23 19 10.5h-5.3L14.5 1z';
  function icon(kind) { // 'w' повна година | 'l' нема перші 30 хв | 'r' нема другі 30 хв
    const dark = `<path d="${BOLT}" fill="var(--off)"/>` +
      `<path d="M3.5 3.5 20.5 20.5" stroke="var(--off)" stroke-width="2.2" stroke-linecap="round"/>`;
    const gold = `<path d="${BOLT}" fill="var(--bolt)"/>`;
    // кліп-пати #icL/#icR оголошені один раз у прихованому svg в <body>
    const half = (clip, inner) => `<g clip-path="url(#${clip})">${inner}</g>`;
    const body = kind === 'w' ? dark
      : kind === 'l' ? half('icL', dark) + half('icR', gold)
      : half('icL', gold) + half('icR', dark);
    return `<span class="ic"><svg viewBox="0 0 24 24" aria-hidden="true">${body}</svg></span>`;
  }
  document.querySelectorAll('.sw[data-ic]').forEach((el) =>
    el.insertAdjacentHTML('beforeend', icon(el.dataset.ic)));

  // --- тема ---------------------------------------------------------------
  const isDark = () => document.documentElement.dataset.theme
    ? document.documentElement.dataset.theme === 'dark'
    : matchMedia('(prefers-color-scheme: dark)').matches;
  const paintThemeBtn = () => { els.themeBtn.textContent = isDark() ? '☀️' : '🌙'; };
  els.themeBtn.addEventListener('click', () => {
    const next = isDark() ? 'light' : 'dark';
    document.documentElement.dataset.theme = next;
    document.cookie = `theme=${next};max-age=31536000;path=/;SameSite=Lax`;
    paintThemeBtn();
  });
  paintThemeBtn();

  // --- перемикач "приховати пусті" (стан у куці) ---------------------------
  els.hideEmpty.checked = /(?:^|;\s*)hideEmpty=1/.test(document.cookie);
  els.hideEmpty.addEventListener('change', () => {
    document.cookie = `hideEmpty=${els.hideEmpty.checked ? 1 : 0};max-age=31536000;path=/;SameSite=Lax`;
  });

  // --- дати/час -----------------------------------------------------------
  const kyivToday = () => new Intl.DateTimeFormat('en-CA', { timeZone: 'Europe/Kyiv' }).format(new Date());
  const addDays = (ymd, n) => {
    const d = new Date(ymd + 'T00:00:00Z'); d.setUTCDate(d.getUTCDate() + n);
    return d.toISOString().slice(0, 10);
  };
  const dateLabel = (ymd) => {
    const d = new Date(ymd + 'T00:00:00Z');
    return `${DOW[d.getUTCDay()]}, ${ymd.slice(8, 10)}.${ymd.slice(5, 7)}.${ymd.slice(0, 4)}`;
  };
  const minutesOf = (iso) => Number(iso.slice(11, 13)) * 60 + Number(iso.slice(14, 16));

  async function fetchJson(file) {
    const res = await fetch(DATA_BASE + file, { cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status} для ${file}`);
    return res.json();
  }

  // Clip an interval to one Kyiv date; ISO strings already carry the Kyiv
  // offset, so wall-clock parsing is plain text slicing.
  function clipToDate(iv, ymd) {
    const sd = iv.start.slice(0, 10), ed = iv.end.slice(0, 10);
    if (sd > ymd || ed < ymd || (ed === ymd && minutesOf(iv.end) === 0)) return null;
    const from = sd < ymd ? 0 : minutesOf(iv.start);
    const to = ed > ymd ? 1440 : minutesOf(iv.end);
    return to > from ? [from, to] : null;
  }

  // 48 half-hour slots: 0 = on, 1 = possible, 2 = off (off wins).
  function slotsFor(intervals, ymd) {
    const slots = new Array(48).fill(0);
    for (const iv of intervals) {
      const clip = clipToDate(iv, ymd);
      if (!clip) continue;
      const rank = iv.kind === 'off' ? 2 : 1;
      for (let i = Math.floor(clip[0] / 30); i < Math.ceil(clip[1] / 30); i++)
        slots[i] = Math.max(slots[i], rank);
    }
    return slots;
  }

  function availableDates(doc) {
    const dates = new Set([kyivToday(), addDays(kyivToday(), 1)]);
    for (const g of Object.values(doc.schedules || {}))
      for (const iv of g.intervals || []) {
        let d = iv.start.slice(0, 10);
        const last = minutesOf(iv.end) === 0 ? addDays(iv.end.slice(0, 10), -1) : iv.end.slice(0, 10);
        for (; d <= last; d = addDays(d, 1)) dates.add(d);
      }
    return [...dates].sort();
  }

  function fillSelect(sel, options, value) {
    sel.innerHTML = '';
    for (const { v, label } of options) {
      const o = document.createElement('option');
      o.value = v; o.textContent = label;
      sel.appendChild(o);
    }
    sel.value = options.some((o) => o.v === value) ? value : (options[0]?.v ?? '');
    return sel.value;
  }

  function statusText(st) {
    return { waf_blocked: 'джерело тимчасово блокує збір (WAF)', timeout: 'джерело не відповіло вчасно',
             parse_error: 'помилка розбору даних джерела', no_data: 'джерело не віддало даних' }[st] || st;
  }

  function render() {
    const doc = state.doc, ymd = state.date;
    const src = state.index.sources.find((s) => s.id === state.region);
    els.title.textContent = `Графік відключень — ${src ? src.region : ''}`;
    document.title = `Відключення світла — ${src ? src.region : ''}`;

    const upd = doc.status?.sourceUpdatedAt ||
      (doc.updatedAt ? doc.updatedAt.replace('T', ' ').slice(0, 16) : '—');
    els.meta.textContent = `Дата та час останнього оновлення інформації на графіку: ${upd}`;

    els.banner.classList.toggle('show', !doc.status?.ok);
    if (!doc.status?.ok)
      els.banner.textContent = `⚠ Останній збір не вдався (${statusText(doc.status?.code)}). ` +
        `Показано останні успішно зібрані дані.`;

    const groups = doc.groups || [];
    if (!groups.length) {
      els.wrap.innerHTML = '<div class="empty">Наразі графіки погодинних відключень для цього регіону не опубліковані — застосовуються, лише коли є відповідна команда Укренерго.</div>';
      return;
    }

    const table = document.createElement('table');
    const thead = document.createElement('thead');
    const hr = document.createElement('tr');
    hr.innerHTML = '<th class="corner">Черга \\ Час</th>' +
      Array.from({ length: 24 }, (_, h) =>
        `<th scope="col"><span>${String(h).padStart(2, '0')}-${String(h + 1).padStart(2, '0')}</span></th>`).join('');
    thead.appendChild(hr);
    table.appendChild(thead);

    const NAMES = ['', 'можливе відключення', 'світла нема'];
    const tbody = document.createElement('tbody');
    let shown = 0;
    for (const label of groups) {
      const g = doc.schedules[label] || { name: `Черга ${label}`, intervals: [] };
      const slots = slotsFor(g.intervals || [], ymd);
      if (els.hideEmpty.checked && !slots.some(Boolean)) continue;
      shown++;
      const tr = document.createElement('tr');
      tr.innerHTML = `<th scope="row">${g.name || `Черга ${label}`}</th>`;
      for (let h = 0; h < 24; h++) {
        const a = slots[2 * h], b = slots[2 * h + 1];
        const td = document.createElement('td');
        td.className = 'slot';
        const cls = (s) => s === 2 ? 'h off' : s === 1 ? 'h pos' : 'h';
        const ic = a === 2 && b === 2 ? icon('w') : a === 2 ? icon('l') : b === 2 ? icon('r') : '';
        td.innerHTML = `<div class="halves"><span class="${cls(a)}"></span><span class="${cls(b)}"></span></div>${ic}`;
        const hh = String(h).padStart(2, '0'), h2 = String(h + 1).padStart(2, '0');
        let tip = 'світло є';
        if (a || b) {
          tip = a === b ? NAMES[a]
            : `${a ? NAMES[a] : 'світло є'} перші 30 хв, ${b ? NAMES[b] : 'світло є'} другі 30 хв`;
        }
        td.title = `${g.name || label} · ${hh}:00–${h2}:00 — ${tip}`;
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    els.wrap.innerHTML = '';
    if (!shown) {
      els.wrap.innerHTML = '<div class="empty">На обрану дату відключень не заплановано.</div>';
      return;
    }
    els.wrap.appendChild(table);
  }

  function syncUrl() {
    const q = new URLSearchParams({ region: state.region, date: state.date });
    history.replaceState(null, '', location.pathname + '?' + q);
  }

  async function loadRegion(id, keepDate) {
    state.region = id;
    state.doc = await fetchJson(state.index.sources.find((s) => s.id === id)?.file || `${id}.json`);
    const dates = availableDates(state.doc);
    const want = keepDate && dates.includes(state.date) ? state.date : kyivToday();
    state.date = fillSelect(els.date, dates.map((d) => ({ v: d, label: dateLabel(d) })), want);
    render();
    syncUrl();
  }

  async function boot() {
    const q = new URLSearchParams(location.search);
    state.index = await fetchJson('index.json');
    const regions = state.index.sources.map((s) => ({ v: s.id, label: `${s.region} — ${s.name}` }));
    state.region = fillSelect(els.region, regions, q.get('region'));
    if (q.get('date')) state.date = q.get('date');
    await loadRegion(state.region, Boolean(q.get('date')));

    els.region.addEventListener('change', () => loadRegion(els.region.value).catch(fail));
    els.date.addEventListener('change', () => { state.date = els.date.value; render(); syncUrl(); });
    els.hideEmpty.addEventListener('change', render);

    // одинарне виділення рядка: клік — виділити, повторний клік по ньому
    // або клік будь-де інде — зняти; ререндер його не зберігає
    document.addEventListener('click', (e) => {
      const tr = e.target.closest('#tablewrap tbody tr');
      const cur = els.wrap.querySelector('tbody tr.sel');
      if (cur && cur !== tr) cur.classList.remove('sel');
      if (tr) tr.classList.toggle('sel', cur !== tr);
    });

    // авто-оновлення кожні 30 с; фактична свіжість обмежена кешем raw (~5 хв).
    // Ререндеримо лише за реальної зміни, щоб не скидати скрол таблиці.
    setInterval(async () => {
      try {
        const file = state.index.sources.find((s) => s.id === state.region)?.file || `${state.region}.json`;
        const doc = await fetchJson(file);
        if (doc.updatedAt === state.doc?.updatedAt && doc.status?.code === state.doc?.status?.code) return;
        state.doc = doc;
        const dates = availableDates(doc);
        const want = dates.includes(state.date) ? state.date : kyivToday();
        state.date = fillSelect(els.date, dates.map((d) => ({ v: d, label: dateLabel(d) })), want);
        render();
      } catch { /* тимчасова помилка мережі — спробуємо наступного разу */ }
    }, 30 * 1000);
  }

  function fail(err) {
    els.meta.textContent = '';
    els.banner.textContent = `Не вдалося завантажити дані: ${err.message}. Спробуйте оновити сторінку.`;
    els.banner.classList.add('show');
  }

  boot().catch(fail);
})();
</script>
</body>
</html>
